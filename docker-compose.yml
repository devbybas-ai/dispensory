services:
  db:
    image: postgres:17-alpine
    container_name: dispensory-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: dispensory_user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: dispensory
    volumes:
      - dispensory_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dispensory_user -d dispensory"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: dispensory-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - dispensory_redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  dispensory_pgdata:
  dispensory_redisdata:
